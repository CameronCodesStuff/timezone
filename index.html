<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NZ & Scotland Time</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="clock">
    <h1>New Zealand</h1>
    <p id="nz-time">--:--:--</p>
    <span class="date" id="nz-date"></span>
  </div>

  <div class="clock">
    <h1>Scotland</h1>
    <p id="scotland-time">--:--:--</p>
    <span class="date" id="scotland-date"></span>
  </div>

  <script src="script.js"></script>
</body>
</html>
